[package]
name = "anon-telemetry"
version = "0.1.0"
edition = "2021"
description = "Anonymous telemetry client for Rust"
license = "MIT"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
reqwest = { version = "0.11", features = ["json", "rustls-tls"] }
tokio = { version = "1", features = ["full"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
dirs = "5.0"
chrono = { version = "0.4", features = ["serde"] }
once_cell = "1.18"
log = "0.4"
futures-util = "0.3"
