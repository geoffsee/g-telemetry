name = "anon-telemetry-sink"
main = "src/index.ts"
compatibility_date = "2026-04-12"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "telemetry_db"
database_id = "{{D1_TELEMETRY_DB_ID}}"

# KV Namespace for rate limiting
[[kv_namespaces]]
binding = "TELEMETRY_KV"
id = "{{KV_TELEMETRY_ID}}"
preview_id = "{{KV_TELEMETRY_PREVIEW_ID}}"

[vars]
RATE_LIMIT_RPM = 1000
MAX_PAYLOAD_SIZE = 102400 # 100KB
# BASIC_AUTH = "user:password" # Configure via `wrangler secret put BASIC_AUTH`

# ── Dev environment ──────────────────────────────────────────────────
[env.dev]
name = "anon-telemetry-sink-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "telemetry_db_dev"
database_id = "{{D1_TELEMETRY_DB_DEV_ID}}"

[[env.dev.kv_namespaces]]
binding = "TELEMETRY_KV"
id = "{{KV_TELEMETRY_DEV_ID}}"

[env.dev.vars]
RATE_LIMIT_RPM = 1000
MAX_PAYLOAD_SIZE = 102400
